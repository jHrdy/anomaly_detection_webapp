<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector Analysis | Anomaly Simulation</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@2.2.3/dist/chartjs-plugin-dragdata.min.js"></script>
    
    <style>
        /* Moderný "AI/SaaS" Svetlý Vzhľad */
        :root {
            --bg-page: #f1f5f9;         /* Veľmi svetlá chladná sivá pre pozadie */
            --bg-card: #ffffff;         /* Čistá biela pre komponenty */
            --text-main: #0f172a;       /* Tmavá bridlicová pre vysoký kontrast */
            --text-muted: #64748b;      /* Jemnejšia sivá pre popisy */
            --border-soft: #e2e8f0;     /* Nevtieravé okraje */
            
            /* Gradient pre "šmrnc" (Teal do Indigo) */
            --gradient-primary: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            --shadow-float: 0 20px 40px -15px rgba(0,0,0,0.05);
            --shadow-btn: 0 8px 15px -3px rgba(99, 102, 241, 0.3);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-page); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px; 
            margin: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            background-color: var(--bg-card); 
            padding: 40px 50px; 
            border-radius: 20px; /* Moderné oblejšie rohy */
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: var(--shadow-float); 
            width: 100%; 
            max-width: 1050px; 
            position: relative;
            overflow: hidden;
        }

        /* Jemná farebná linka na vrchu karty pre prémiový vzhľad */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--gradient-primary);
        }

        h2 {
            text-align: center; 
            margin-top: 10px;
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            /* Gradientový text pre nadpis */
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center; 
            color: var(--text-muted); 
            margin-bottom: 40px;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .chart-wrapper { 
            height: 400px; 
            margin-bottom: 35px; 
            padding: 10px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
        }

        .controls { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center; 
            align-items: center;
            gap: 25px; 
            padding: 25px;
            background-color: #ffffff;
            border-radius: 16px;
            border: 1px solid var(--border-soft);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }

        .quantile-control {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Krásny moderný slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 160px;
            height: 6px;
            background: #cbd5e1;
            border-radius: 10px;
            outline: none;
            transition: 0.2s;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            border: 3px solid #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        output {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-weight: 700;
            color: #4f46e5;
            font-size: 0.95rem;
            border: 1px solid var(--border-soft);
        }

        button { 
            padding: 12px 32px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            letter-spacing: 0.5px;
        }

        .btn-evaluate { 
            background: var(--gradient-primary); 
            color: white; 
            box-shadow: var(--shadow-btn);
        }

        .btn-evaluate:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-reset { 
            background-color: transparent; 
            color: var(--text-muted); 
            border: 2px solid #e2e8f0;
        }

        .btn-reset:hover { 
            background-color: #f8fafc; 
            color: var(--text-main);
            border-color: #cbd5e1;
        }

        #result { 
            margin-top: 30px;
            width: 100%; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            color: white; 
            font-size: 1.2em; 
            display: none; 
            box-sizing: border-box;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: background-color 0.4s ease;
        }

        #heatmap-container {
            margin-top: 30px; 
            width: 100%; 
            text-align: center; 
            display: none;
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-float);
            box-sizing: border-box;
        }
        
        #heatmap-container h3 {
            margin-top: 0;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 20px;
        }

        #heatmap-container img {
            border-radius: 8px;
            border: 1px solid var(--border-soft);
            max-width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Detector Data Analysis</h2>
        <p class="subtitle">
            Interactive Anomaly Detection via Deep Reconstruction
        </p>

        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>

        <div class="controls">
            <div class="quantile-control">
                <label for="qRange">Evaluation Quantile (q):</label>
                <input type="range" id="qRange" min="0.5" max="0.99" step="0.01" value="0.9" 
                       oninput="this.nextElementSibling.value = parseFloat(this.value).toFixed(2)">
                <output>0.90</output>
            </div>

            <button class="btn-evaluate" onclick="evaluateModel()">Run Inference</button>
            <button class="btn-reset" onclick="resetData()">Clear Data</button>
        </div>

        <div id="result"></div>
    </div>
    
    <div id="heatmap-container"></div>

    <script>
        Chart.defaults.color = '#64748b'; // Jemná sivá pre texty
        Chart.defaults.borderColor = '#f1f5f9'; // Takmer neviditeľná mriežka
        Chart.defaults.font.family = "'Inter', system-ui, -apple-system, sans-serif";
        Chart.defaults.font.weight = '500';
    </script>
    
    <script src="{{ url_for('static', filename='js/chart_logic.js') }}"></script>
</body>
</html>
