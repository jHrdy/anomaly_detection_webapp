<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomaly Detection GUI - Detector Simulation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@2.2.3/dist/chartjs-plugin-dragdata.min.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f7f6; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 1000px; 
        }
        .chart-wrapper { 
            height: 400px; 
            margin-bottom: 30px; 
        }
        .controls { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center; 
            align-items: center;
            gap: 20px; 
            margin-bottom: 20px; 
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
        }
        .quantile-control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }
        button { 
            padding: 12px 30px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-evaluate { 
            background: #2980b9; 
            color: white; 
        }
        .btn-evaluate:hover { 
            background: #1f6391; 
        }
        .btn-reset { 
            background: #95a5a6; 
            color: white; 
        }
        .btn-reset:hover { 
            background: #7f8c8d; 
        }
        #result { 
            width: 100%; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
            color: white; 
            font-size: 1.2em; 
            display: none; 
            box-sizing: border-box;
        }
        input[type=range] {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">Detektorový Anomálny Simulátor</h2>
        <p style="text-align: center; color: #666; margin-bottom: 25px;">
            Nakreslite priebeh signálu myšou a stlačte <strong>Evaluate</strong> pre kvantilovú analýzu.
        </p>

        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>

        <div class="controls">
            <div class="quantile-control">
                <label for="qRange">Kvantil (q):</label>
                <input type="range" id="qRange" min="0.5" max="0.99" step="0.01" value="0.9" 
                       oninput="this.nextElementSibling.value = this.value">
                <output style="min-width: 40px;">0.9</output>
            </div>

            <button class="btn-evaluate" onclick="evaluateModel()">Evaluate</button>
            <button class="btn-reset" onclick="resetData()">Reset</button>
        </div>

        <div id="result"></div>
    </div>
    <div id="heatmap-container" style="margin-top: 30px; width: 100%; text-align: center; display: none;">
    </div>
    <script src="{{ url_for('static', filename='js/chart_logic.js') }}"></script>
</body>
</html>
